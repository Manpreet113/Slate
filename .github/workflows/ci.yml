name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm git base-devel rustup
        rustup default stable
        
    - uses: actions/checkout@v4

    - name: Cache target and registry
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: archlinux-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          archlinux-cargo-

    - name: Do Formatting
      run: cargo fmt 

    - name: Clippy Linting
      run: cargo clippy -- -D warnings || true

    - name: Build
      run: cargo build --verbose

    - name: Run Tests
      run: cargo test --verbose

  release-latest:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
    - name: Install dependencies
      run: |
        pacman -Syu --noconfirm git base-devel rustup
        rustup default stable

    - uses: actions/checkout@v4

    - name: Build Release
      run: cargo build --release

    - name: Create or Update Latest Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: "Rolling Latest Release (main)"
        files: target/release/slate
        prerelease: true
        body: |
          Automated rolling release for the latest push to `main`.
          **Commit**: ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

